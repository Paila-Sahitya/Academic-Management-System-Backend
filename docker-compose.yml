services:
  postgres:
    image: postgres:15
    container_name: ams_postgres
    restart: always
    environment:
      POSTGRES_USER: ams_user
      POSTGRES_PASSWORD: ams1234
      POSTGRES_DB: ams_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: ams_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  postgres_data:
  redis_data: