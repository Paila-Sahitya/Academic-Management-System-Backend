services:
  postgres:
    image: postgres:15
    container_name: ams_postgres
    restart: always
    environment:
      POSTGRES_USER: ams_user
      POSTGRES_PASSWORD: ams1234
      POSTGRES_DB: ams_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data: